<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1E1208;--surf:#2A1A0D;--surf2:#352011;
  --bdr:#4A2E14;--bdr2:#3A2010;
  --txt:#F2DFC8;--txt2:#9E7A58;--txt3:#4E3020;
  --green:#6BAE5E;--amber:#D4880C;--red:#C04040;--info:#5888BB;
  --r:12px;--rs:8px;
}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;min-height:100dvh;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0)}
#app{max-width:480px;margin:0 auto;padding:1rem 1rem 3rem}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:var(--txt2);margin-bottom:1.5rem}
.card{background:var(--surf);border:0.5px solid var(--bdr);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--surf);border-radius:var(--rs);padding:.9rem 1rem}
.stat-label{font-size:11px;color:var(--txt2);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;line-height:1.2}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:3px}
.bar-row{margin-bottom:16px}
.bar-row:last-child{margin-bottom:0}
.bar-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.bar-name{font-size:13px;color:var(--txt2)}
.bar-info{font-size:11px;color:var(--txt3)}
.bar-track{height:8px;background:var(--bdr2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-marker{position:absolute;top:0;height:100%;width:2px;background:var(--red)}
.bar-maxlabel{text-align:right;font-size:10px;color:var(--txt3);margin-top:3px}
.info-box{border-radius:var(--rs);padding:10px 14px;font-size:13px;line-height:1.5;margin-bottom:12px}
.info-box.info{background:#1a2e40;color:#82b4db;border:0.5px solid #2a4a66}
.info-box.danger{background:#3a1515;color:#d08080;border:0.5px solid #5a2020}
.info-box.success{background:#152a15;color:#7ab87a;border:0.5px solid #2a4a2a}
label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px}
input,select{width:100%;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:15px;padding:10px 12px;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--amber)}
select option{background:var(--surf)}
.field{margin-bottom:14px}
.btn{width:100%;padding:12px;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--amber);color:var(--bg)}
.btn-secondary{background:var(--surf2);color:var(--txt2);border:0.5px solid var(--bdr)}
.btn-row{display:flex;gap:8px}
.btn-row .btn-secondary{flex:1}
.btn-row .btn-primary{flex:2}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem}
.top-bar-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:50%;background:var(--surf);border:0.5px solid var(--bdr);color:var(--txt2);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
.text-btn{background:var(--surf);border:0.5px solid var(--bdr);color:var(--txt2);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
.lang-bar{display:flex;justify-content:flex-end;gap:4px;margin-bottom:1rem}
.lang-btn{background:var(--surf);border:0.5px solid var(--bdr);color:var(--txt2);font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer}
.lang-btn.active{border-color:var(--amber);color:var(--amber);font-weight:600}
.session-list-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bdr2)}
.session-list-item:last-child{border-bottom:none}
.sess-date{font-size:13px;color:var(--txt2)}
.sess-note{font-size:11px;color:var(--txt3);margin-left:8px}
.sess-malas{font-size:14px;font-weight:600}
.sess-ag{font-size:12px;color:var(--amber);margin-left:8px}
.warn{font-size:12px;color:var(--red);margin-bottom:8px;line-height:1.5}
.section-label{font-size:12px;color:var(--txt2);margin-bottom:8px}
.help-section{background:var(--surf);border:0.5px solid var(--bdr);border-radius:var(--r);padding:1rem;margin-bottom:10px}
.help-section h3{font-size:14px;font-weight:600;margin-bottom:6px}
.help-section p{font-size:13px;color:var(--txt2);line-height:1.6}
.spinner{text-align:center;padding:3rem 0;color:var(--txt3)}
.sent-box{text-align:center;padding:2rem 0}
.sent-box p{color:var(--txt2);font-size:14px;line-height:1.7}
.sent-email{color:var(--amber);font-weight:600}
.divider{height:0.5px;background:var(--bdr2);margin:1.5rem 0}
.sign-out{font-size:12px;color:var(--txt3);cursor:pointer;text-decoration:underline;text-align:center;margin-top:1rem}
.type-toggle{display:flex;margin-bottom:12px;border-radius:var(--rs);overflow:hidden;border:0.5px solid var(--bdr)}
.type-btn{flex:1;padding:10px;background:var(--bg);color:var(--txt2);font-size:13px;cursor:pointer;border:none;transition:background .15s,color .15s}
.type-btn.active-std{background:var(--surf2);color:var(--txt);font-weight:600}
.type-btn.active-ag{background:var(--amber);color:var(--bg);font-weight:600}
</style>

  auth: {
    detectSessionInUrl: true,
    persistSession: true
  }
});

// ── HELPERS ───────────────────────────────────────────────
const app = document.getElementById('app');
function t(k, v = {}) {
  const tx = TR[lang] || TR.cs;
  let s = tx[k] !== undefined ? tx[k] : (TR.cs[k] || k);
  if (typeof s === 'object') return s;
  Object.entries(v).forEach(([a, b]) => { s = s.replace('{' + a + '}', b); });
  return s;
}
function fmt(n) {
  const r = Math.round(n);
  if (lang === 'hi') return r.toLocaleString('hi-IN');
  if (lang === 'en') return r.toLocaleString('en-US');
  return r.toLocaleString('cs-CZ');
}
function today() { return new Date().toISOString().slice(0, 10); }
function computeStats() {
  const lv = LEVELS[profile?.level] || LEVELS['0'];
  const totalMalas = sessions.reduce((s, x) => s + (x.malas || 0), 0);
  const totalAgiyari = sessions.reduce((s, x) => s + (x.agiyari_malas || 0), 0);
  return { totalMalas, totalAgiyari, targetMalas: lv.malas, targetAgiyari: lv.agiyariTarget, maxAllowed: Math.floor(totalMalas * 0.1), lv };
}
function setLang(l) {
  lang = l;
  localStorage.setItem('mt_lang', l);
  render();
}

// ── SUPABASE OPS ──────────────────────────────────────────
async function loadProfile(userId) {
  const { data } = await sb.from('profiles').select('*').eq('id', userId).single();
  return data;
}
async function loadSessions(userId, level) {
  const { data } = await sb.from('sessions')
    .select('*')
    .eq('user_id', userId)
    .eq('level', level)
    .order('created_at', { ascending: false });
  return data || [];
}
async function saveProfile(userId, name, level) {
  const { data } = await sb.from('profiles').insert({ id: userId, name, level }).select().single();
  return data;
}
async function addSessionDB(userId, malas, agiyariMalas, note) {
  const { data } = await sb.from('sessions').insert({
    user_id: userId, date: today(), malas, agiyari_malas: agiyariMalas,
    note: note || null, level: profile?.level || '0'
  }).select().single();
  return data;
}

// ── ACTIONS ───────────────────────────────────────────────
async function doSignIn() {
  const email = (document.getElementById('inp-email')?.value || '').trim();
  const pwd = document.getElementById('inp-pwd')?.value || '';
  if (!email || !pwd) return;
  const btn = document.getElementById('btn-signin');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  authErrHide('auth-err');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) {
    authErr('auth-err', t('authErrWrong'));
    if (btn) { btn.disabled = false; btn.textContent = t('signInBtn'); }
    return;
  }
  await handleSession(data.session);
}

async function doRegister() {
  const email = (document.getElementById('inp-email')?.value || '').trim();
  const pwd = document.getElementById('inp-pwd')?.value || '';
  const pwd2 = document.getElementById('inp-pwd2')?.value || '';
  if (!email || !pwd) return;
  if (pwd.length < 6) { authErr('reg-err', t('authErrShort')); return; }
  if (pwd !== pwd2) { authErr('reg-err', t('authErrMismatch')); return; }
  const btn = document.getElementById('btn-reg');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  authErrHide('reg-err');
  const { data, error } = await sb.auth.signUp({ email, password: pwd });
  if (error) {
    authErr('reg-err', error.message?.includes('already') ? t('authErrExists') : error.message);
    if (btn) { btn.disabled = false; btn.textContent = t('registerBtn'); }
    return;
  }
  await handleSession(data.session);
}

async function doReset() {
  const email = (document.getElementById('inp-email')?.value || '').trim();
  if (!email) return;
  const btn = document.getElementById('btn-reset');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  await sb.auth.resetPasswordForEmail(email, { redirectTo: SITE_URL });
  const msg = document.getElementById('reset-msg');
  if (msg) { msg.style.display = ''; msg.textContent = t('resetSent'); }
  if (btn) { btn.disabled = false; btn.textContent = t('resetBtn'); }
}

async function createProfileAction() {
  const name = (document.getElementById('inp-name')?.value || '').trim();
  const errDiv = document.getElementById('setup-error');
  const btn = document.getElementById('btn-create');

  if (!name) {
    document.getElementById('inp-name')?.focus();
    return;
  }

  settingUp = true;
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  if (errDiv) errDiv.style.display = 'none';

  try {
    const level = document.getElementById('inp-level')?.value || '0';
    const sm = Math.max(0, parseInt(document.getElementById('inp-sm')?.value) || 0);
    const sa = Math.max(0, parseInt(document.getElementById('inp-sa')?.value) || 0);

    const { data: authData, error: authErr } = await sb.auth.getUser();
    if (authErr || !authData?.user) throw new Error('Přihlášení vypršelo — přihlas se znovu.');

    const userId = authData.user.id;

    const { data: prof, error: insertErr } = await sb.from('profiles')
      .upsert({ id: userId, name, level }, { onConflict: 'id' })
      .select().single();

    if (insertErr) throw insertErr;
    profile = prof;

    if (sm > 0) {
      const { error: sessErr } = await sb.from('sessions').insert({
        user_id: userId, date: today(), malas: sm, agiyari_malas: sa,
        note: t('initialState'), level: level
      });
      if (sessErr) console.warn('Session insert error:', sessErr);
    }

    sessions = await loadSessions(userId, level);
    screen = 'main';
    render();
  } catch (err) {
    const msg = err?.message || err?.details || JSON.stringify(err);
    if (errDiv) { errDiv.style.display = ''; errDiv.textContent = 'Chyba: ' + msg; }
    if (btn) { btn.disabled = false; btn.textContent = t('createProfile'); }
    console.error('createProfileAction error:', err);
  } finally {
    settingUp = false;
  }
}

function setSessionType(type) {
  sessionType = type;
  const btns = document.querySelectorAll('.type-btn');
  if (btns[0]) btns[0].className = 'type-btn' + (type === 'standard' ? ' active-std' : '');
  if (btns[1]) btns[1].className = 'type-btn' + (type === 'agiyari' ? ' active-ag' : '');
  validateSession();
}

function validateSession() {
  const malas = parseInt(document.getElementById('inp-malas')?.value) || 0;
  const { totalMalas, totalAgiyari } = computeStats();
  const w = document.getElementById('session-warn');
  const btn = document.getElementById('btn-log');
  if (!w || !btn) return;
  if (sessionType === 'agiyari' && malas > 0) {
    const newMax = Math.floor((totalMalas + malas) * 0.1);
    if (totalAgiyari + malas > newMax) {
      const maxAdd = Math.max(0, newMax - totalAgiyari);
      w.style.display = ''; w.textContent = t('warn10', { n: fmt(maxAdd) }); btn.disabled = true; return;
    }
  }
  w.style.display = 'none'; btn.disabled = false;
}

async function logSession() {
  const malas = parseInt(document.getElementById('inp-malas')?.value) || 0;
  if (malas <= 0) return;
  const agiyariMalas = sessionType === 'agiyari' ? malas : 0;
  const { data: { user } } = await sb.auth.getUser();
  const newSession = await addSessionDB(user.id, malas, agiyariMalas, null);
  if (newSession) sessions.unshift(newSession);
  sessionType = 'standard';
  render();
}

  const opts = t('levelOpts');
  const optHtml = Object.entries(opts).map(([k, v]) =>
    `<option value="${k}"${profile?.level === k ? ' selected' : ''}>${v}</option>`
  ).join('');
  app.innerHTML = `${langBar()}
    <div class="top-bar" style="margin-bottom:1.5rem;">
      <h1>${t('profileTitle')}</h1>
      <button class="text-btn" onclick="screen='main';render()">${t('helpClose')}</button>
    </div>
    <div class="card">
      <div class="field">
        <label>${t('nameLabel')}</label>
        <div style="padding:10px 0;color:var(--txt);font-size:15px;font-weight:600;">${profile?.name || ''}</div>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>${t('levelLabel')}</label>
        <select id="edit-level">${optHtml}</select>
      </div>
    </div>
    <div id="profile-msg" style="display:none;font-size:12px;margin-top:8px;color:var(--red);line-height:1.5;"></div>
    <div style="margin-top:12px;">
      <button id="btn-save-profile" class="btn btn-primary" onclick="saveProfileChanges()">${t('saveChanges')}</button>
    </div>`;
}

async function saveProfileChanges() {
  const level = document.getElementById('edit-level')?.value;
  const btn = document.getElementById('btn-save-profile');
  const msg = document.getElementById('profile-msg');
  if (!level || !profile) return;

  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  if (msg) msg.style.display = 'none';

  try {
    const { data, error } = await sb.from('profiles')
      .update({ level })
      .eq('id', profile.id)
      .select().single();
    if (error) throw error;
    profile = data;
    sessions = await loadSessions(profile.id, level);
    screen = 'main';
    render();
  } catch (e) {
    if (msg) { msg.style.display = ''; msg.textContent = 'Chyba: ' + (e.message || JSON.stringify(e)); }
    if (btn) { btn.disabled = false; btn.textContent = t('saveChanges'); }
  }
}

async function doSignOut() {
  await sb.auth.signOut();
  profile = null; sessions = [];
  screen = 'auth'; render();
}

// ── INIT ──────────────────────────────────────────────────
async function handleSession(session) {
  if (!session) { screen = 'auth'; render(); return; }
  const user = session.user;
  try {
    profile = await loadProfile(user.id);
    if (!profile) { screen = 'setup'; render(); return; }
    sessions = await loadSessions(user.id, profile.level);
    screen = 'main'; render();
  } catch (e) {
    console.error('handleSession error:', e);
    screen = 'auth'; render();
  }
}

(async function init() {
  screen = 'loading'; render();

  // Watch for auth changes (sign in via magic link, sign out)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (settingUp) return;
    if (event === 'INITIAL_SESSION') return; // handled by getSession() below
    await handleSession(session);
  });

  // Initial session check — more reliable than waiting for onAuthStateChange
  let initDone = false;
  const fallback = setTimeout(() => {
    if (!initDone) { screen = 'auth'; render(); }
  }, 6000);

  try {
    const { data: { session }, error } = await sb.auth.getSession();
    clearTimeout(fallback);
    initDone = true;
    if (error) throw error;
    await handleSession(session);
  } catch (e) {
    clearTimeout(fallback);
    initDone = true;
    console.error('Init error:', e);
    screen = 'auth'; render();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Matra/sw.js').catch(() => {});
  }
})();
</script>
